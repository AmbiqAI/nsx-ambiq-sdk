schema_version: 1

module:
  name: nsx-ambiq-hal-r4
  type: backend_specific
  category: sdk_component
  version: "4.5.1"

support:
  ambiqsuite: true
  zephyr: false

summary: Curated Ambiq HAL wrapper surface for AmbiqSuite r4 targets.

capabilities:
  - hal_wrapper
  - ambiq_hal
  - sdk_component

use_cases:
  - access supported Ambiq HAL services on r4 targets
  - wrap raw SDK HAL content behind a stable NSX-facing surface
  - dependency for platform and BSP integration on r4

agent_keywords:
  - hal
  - ambiq
  - r4
  - wrapper

build:
  cmake:
    package: nsx_soc_apollo4p
    targets:
      - nsx::ambiq_hal

depends:
  required:
    - nsx-cmsis-core
    - nsx-ambiqsuite-r4
  optional: []

compatibility:
  boards:
    - apollo4l_evb
    - apollo4l_blue_evb
    - apollo4p_evb
    - apollo4p_blue_kbr_evb
    - apollo4p_blue_kxr_evb
  socs:
    - apollo4l
    - apollo4p
  toolchains:
    - arm-none-eabi-gcc
    - atfe
    - armclang
