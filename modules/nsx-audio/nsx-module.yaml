schema_version: 1
module:
  name: nsx-audio
  type: backend_specific
  version: "5.2.23"
support:
  ambiqsuite: true
  zephyr: false
summary: PDM audio capture helper for AmbiqSuite R5 Apollo5-family targets.
capabilities: [audio, pdm, microphone, dma]
use_cases:
  - initialize board-supported PDM capture with caller-owned buffers
  - receive DMA-backed PCM sample callbacks from a PDM microphone
  - provide a stable NSX audio API across AmbiqSuite releases
agent_keywords: [audio, pdm, microphone, capture, dma, sampling, r5]
build:
  cmake:
    package: nsx_audio
    targets: [nsx::audio]
depends:
  required: [nsx-core, nsx-soc-hal]
  optional: []
compatibility:
  boards:
    - apollo330mP_evb
    - apollo510_evb
    - apollo510b_evb
    - apollo510dL_evb
  socs:
    - apollo330P
    - apollo510
    - apollo510b
    - apollo510L
    - apollo4l
    - apollo4p
    - apollo3
    - apollo3p
  toolchains: [arm-none-eabi-gcc, armclang, atfe]
