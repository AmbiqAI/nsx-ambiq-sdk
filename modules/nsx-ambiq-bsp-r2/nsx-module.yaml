schema_version: 1

module:
  name: nsx-ambiq-bsp-r2
  type: backend_specific
  category: sdk_component
  version: "3.2.1"

support:
  ambiqsuite: true
  zephyr: false

summary: Curated BSP wrapper surface for board-support integration on AmbiqSuite r2 targets.

capabilities:
  - bsp_wrapper
  - board_support
  - sdk_component

use_cases:
  - board-support integration for r2 targets
  - stable BSP access without wiring raw SDK board files by hand
  - dependency for board-oriented application bring-up on r2

agent_keywords:
  - bsp
  - board support
  - r2
  - wrapper

build:
  cmake:
    package: nsx_board_apollo2_evb
    targets:
      - nsx::ambiq_bsp

depends:
  required:
    - nsx-ambiqsuite-r2
    - nsx-ambiq-hal-r2
  optional: []

compatibility:
  boards:
    - apollo2_evb
    - apollo2_evb_cygnus
    - apollo2_evb
    - apollo2_evb_cygnus
    - apollo2_evb_cygnus
  socs:
    - apollo2
    - apollo2
  toolchains:
    - arm-none-eabi-gcc
    - atfe
    - armclang
