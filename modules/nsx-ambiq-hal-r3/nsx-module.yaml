schema_version: 1

module:
  name: nsx-ambiq-hal-r3
  type: backend_specific
  category: sdk_component
  version: "3.2.1"

support:
  ambiqsuite: true
  zephyr: false

summary: Curated Ambiq HAL wrapper surface for AmbiqSuite r3 targets.

capabilities:
  - hal_wrapper
  - ambiq_hal
  - sdk_component

use_cases:
  - access supported Ambiq HAL services on r3 targets
  - wrap raw SDK HAL content behind a stable NSX-facing surface
  - dependency for platform and BSP integration on r3

agent_keywords:
  - hal
  - ambiq
  - r3
  - wrapper

build:
  cmake:
    package: nsx_soc_apollo3p
    targets:
      - nsx::ambiq_hal

depends:
  required:
    - nsx-cmsis-core
    - nsx-ambiqsuite-r3
  optional: []

compatibility:
  boards:
    - apollo3_evb
    - apollo3_evb_cygnus
    - apollo3p_evb
    - apollo3p_evb_cygnus
    - apollo3p_evb_cygnus
  socs:
    - apollo3
    - apollo3p
  toolchains:
    - arm-none-eabi-gcc
    - atfe
    - armclang
