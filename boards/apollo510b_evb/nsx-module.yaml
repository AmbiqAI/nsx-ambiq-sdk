schema_version: 1

module:
  name: nsx-board-apollo510b-evb
  type: board
  version: "5.2.23"

support:
  ambiqsuite: true
  zephyr: false

build:
  cmake:
    package: nsx_board_apollo510b_evb
    targets:
      - nsx::board_apollo510b_evb

depends:
  required:
    - nsx-ambiq-hal-r5
    - nsx-ambiq-bsp-r5
    - nsx-soc-hal
    - nsx-cmsis-startup
    - nsx-ambiqsuite-r5
  optional: []

constraints:
  required_sdk_provider: nsx-ambiqsuite-r5

compatibility:
  boards:
    - apollo510b_evb
  socs:
    - apollo510b
  toolchains:
    - arm-none-eabi-gcc
    - atfe
