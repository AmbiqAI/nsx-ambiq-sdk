schema_version: 1

module:
  name: nsx-board-apollo3-apollo3_evb
  type: board
  version: "3.2.1"

support:
  ambiqsuite: true
  zephyr: false

build:
  cmake:
    package: nsx_board_apollo3_evb
    targets:
      - nsx::board_apollo3_evb

depends:
  required:
    - nsx-ambiq-hal-r3
    - nsx-ambiq-bsp-r3
    - nsx-soc-hal
    - nsx-cmsis-startup
    - nsx-ambiqsuite-r3
  optional: []

constraints:
  required_sdk_provider: nsx-ambiqsuite-r3

compatibility:
  boards:
    - apollo3_evb
  socs:
    - apollo3
  toolchains:
    - arm-none-eabi-gcc
    - atfe
    - armclang
